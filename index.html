// To add a new term: add an entry to the correct category's `terms` array.

const GLOSSARY = [
  {
    category: "Core Architecture",
    slug: "core-architecture",
    description: "The foundational building blocks of how LLMs are designed and built.",
    terms: [
      {

      },
      {
        id: "transformer",
        name: "Transformer",
        fullName: "Transformer Architecture",
        body: "The neural network architecture introduced in 2017 (\"Attention is All You Need\") that powers virtually all modern LLMs. Uses self-attention to process tokens in parallel, understanding relationships across the entire context.",
        related: ["Attention", "KV Cache", "LLM"]
      },
      {
        id: "attention",
        name: "Attention",
        fullName: "Self-Attention Mechanism",
        body: "The core operation in a Transformer that lets every token \"look at\" every other token and weigh how relevant each is. This is what gives LLMs their ability to understand long-range dependencies in text.",

      },
      {
        id: "ffn-layer",
        name: "FFN Layer",
        fullName: "Feed-Forward Network Layer",
        body: "The second major component inside every Transformer block, after the attention layer. While attention lets tokens communicate with each other, the FFN processes each token independently through two linear transformations with a non-linearity in between. It is where most of the model's \"knowledge\" is actually stored: research shows that factual associations (Paris to France) live in FFN weights, not attention. In a typical LLM, FFN layers account for roughly 2/3 of all parameters. MoE architectures specifically replace the FFN layer with a pool of expert FFNs and a router, so understanding FFN is the key to understanding MoE.",
        related: ["Transformer", "Attention", "MoE", "Dense Model", "Model Parameters"]
      },
      {
        id: "model-parameters",
        name: "Model Parameters",
        fullName: "Weights and Biases",
        body: "The numerical values inside a model: billions of floating-point numbers that encode everything the model learned during training. A \"70B model\" has 70 billion parameters. More parameters does not always mean better performance.",
        related: ["Fine Tuning", "Quantization", "RAM"]
      },
      {
        id: "tokenizer",
        name: "Tokenizer",
        fullName: "Tokenization",
        body: "The system that converts raw text into tokens: small chunks (words, subwords, or characters) the model actually processes. \"Hello world\" might be 2 tokens; a rare word might be split into 4. Token count directly impacts cost and context limits.",
        related: ["Context Window", "LLM", "Logits"]
      },
      {
        id: "dense-model",
        name: "Dense Model",
        fullName: "Dense Neural Network",

      },
      {
        id: "moe",
        name: "MoE",
        fullName: "Mixture of Experts",
        body: "An architecture where the model contains many specialized sub-networks (\"experts\") and a router that activates only a few of them per token. Used in GPT-4, Mixtral, and others: enables massive parameter counts at a fraction of the compute cost.",

      },
      {
        id: "multimodal",
        name: "Multimodal",
        fullName: "Multimodal Models",
        body: "Models that can process and reason across multiple types of data: text, images, audio, video, code. Claude 3, GPT-4o, and Gemini are all multimodal. Requires encoding different modalities into a shared latent space the LLM can attend over.",
        related: ["LLM", "Embedding", "Latent Space"]
      },
      {
        id: "slm",
        name: "SLM",
        fullName: "Small Language Model",
        body: "A language model small enough to run on consumer hardware or at the edge: typically under 7B parameters. Models like Phi-3, Gemma 2B, and Mistral 7B trade raw capability for dramatically lower inference cost and the ability to run locally without a GPU cluster. Distillation is the primary technique used to build capable SLMs from larger teacher models.",
        related: ["LLM", "Distillation", "Quantization", "Inference"]
      }
    ]
  },
  {
    category: "Memory & Compute",
    slug: "memory-compute",
    description: "Hardware constraints and optimization techniques that dictate production performance.",
    terms: [
      {
        id: "kv-cache",

        body: "A performance optimization that saves the intermediate attention computations (keys and values) for tokens already processed, so the model does not recompute them on each new token. Critical for fast inference in long contexts.",

      },
      {
        id: "quantization",
        name: "Quantization",
        fullName: "Weight Quantization",

        related: ["RAM", "Model Parameters", "Inference"]
      },
      {
        id: "inference",
        name: "Inference",
        fullName: "Model Inference",
        body: "The act of running a trained model to generate output, as opposed to training. When you send a message to Claude, that is inference. Optimizing inference (speed, cost, memory) is a major engineering challenge at scale.",

      }
    ]
  },
  {

    terms: [

        id: "vector",

        fullName: "Embedding Vector",
        body: "A list of numbers (e.g. 1536 floats) that encodes the semantic meaning of text. Texts with similar meaning have vectors that are numerically close to each other. The backbone of semantic search and RAG.",

      },
      {
        id: "embedding",
        name: "Embedding",
        fullName: "Semantic Embedding",

      },
      {

        body: "The abstract mathematical space where embeddings live. Concepts that are semantically similar cluster together; analogies appear as vector arithmetic (king minus man plus woman equals queen). The geometry of this space is what makes semantic search possible.",
        related: ["Embedding", "Vector", "Attention"]
      }
    ]
  },
  {
    category: "Generation & Sampling",
    slug: "generation-sampling",

        body: "When a model confidently generates factually incorrect or fabricated information. Happens because LLMs are trained to produce plausible-sounding text, not verified facts. RAG and grounding techniques help mitigate this.",

      },

        name: "Distillation",
        fullName: "Knowledge Distillation",

        name: "Evals",

  {

        body: "The practice of carefully crafting the text inputs to a model to elicit better, more reliable outputs: using techniques like few-shot examples, chain-of-thought, role instructions, and output formatting constraints.",

      {
        id: "context-engineering",
        name: "Context Engineering",
        fullName: "Context Window Engineering",
        body: "The broader discipline of deciding what information goes into the model's context window: not just the prompt, but retrieved documents, tool results, memory, conversation history, and how it is all structured and prioritized.",

      {
        id: "system-prompt",
        name: "System Prompt",

      {

        name: "Chain of Thought",
        fullName: "Chain-of-Thought (CoT) Prompting",
        body: "A prompting technique that instructs the model to reason step-by-step before giving a final answer. Dramatically improves performance on complex reasoning tasks. The basis of \"thinking\" models like Claude's extended thinking mode.",

      {

      },
      {
        id: "few-shot",
        name: "Few-shot",
        fullName: "Few-shot and Zero-shot Prompting",

      },
      {

        body: "The maximum number of tokens a model can process in a single call: both input and output combined. Claude 3.5 Sonnet has a 200K token context. Longer contexts enable more complex tasks but increase memory and compute costs.",

        name: "Structured Output",

  {

        name: "Agent Sandbox",
        fullName: "Isolated Execution Sandbox",
        body: "An isolated environment where an AI agent runs code or executes actions with restricted access to the host system. Prevents a compromised or misbehaving agent from touching the filesystem, network, or processes outside its allowed scope. Critical for any agent that executes untrusted or LLM-generated code.",
        related: ["AI Agent", "Tool Use", "Prompt Injection"]
      }
    ]
  }
];

// ─── Lookups ──────────────────────────────────────────────────────────────────
const termById = new Map();
const termByName = new Map();
const categoryBySlug = new Map();
const categoryForTerm = new Map();

for (const cat of GLOSSARY) {
  categoryBySlug.set(cat.slug, cat);
  for (const term of cat.terms) {
    termById.set(term.id, term);
    termByName.set(term.name.toLowerCase(), term);
    categoryForTerm.set(term.id, cat);
  }
}

function findTermByName(name) {
  return termByName.get(name.toLowerCase()) || null;
}

function escape(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function firstSentence(str) {
  const m = str.match(/^[^.!?]+[.!?]/);
  return m ? m[0] : str.slice(0, 120);
}

// ─── Sidebar ──────────────────────────────────────────────────────────────────
function renderSidebar(activeCatSlug, activeTermId) {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = GLOSSARY.map(cat => {
    const isActive = cat.slug === activeCatSlug;
    const summaryClass = isActive
      ? 'flex items-center justify-between px-3 py-2 cursor-pointer rounded-sm bg-surface text-primary text-sm font-medium border-l-2 border-primary select-none'
      : 'flex items-center justify-between px-3 py-2 cursor-pointer rounded-sm hover:bg-surface text-text-main text-sm font-medium transition-colors select-none';
    const arrowClass = isActive ? 'material-symbols-outlined text-primary text-[18px] arrow' : 'material-symbols-outlined text-muted text-[18px] arrow';
    const termLinks = cat.terms.map(term => {
      const isActiveTerm = term.id === activeTermId;
      const cls = isActiveTerm
        ? 'text-sm font-mono text-primary block py-1'
        : 'text-sm font-mono text-muted hover:text-text-main transition-colors block py-1';
      return `<a class="${cls}" href="#${term.id}">${escape(term.name)}</a>`;
    }).join('');
    return `
      <details class="group" ${isActive ? 'open' : ''}>
        <summary class="${summaryClass}">
          <a href="#${cat.slug}" class="flex-1" onclick="event.stopPropagation()">${escape(cat.category)}</a>
          <span class="${arrowClass}">keyboard_arrow_down</span>
        </summary>
        <div class="pl-6 pr-3 py-2 flex flex-col gap-1">${termLinks}</div>
      </details>`;
  }).join('');

  // Update nav-home active state
  const navHome = document.getElementById('nav-home');
  if (!activeCatSlug && !activeTermId) {
    navHome.className = 'text-primary text-sm font-medium leading-normal';
  } else {
    navHome.className = 'text-text-main text-sm font-medium leading-normal hover:text-primary transition-colors';
  }
}

// ─── Right Sidebar ────────────────────────────────────────────────────────────
function renderRightSidebar(items, title) {
  const aside = document.getElementById('right-sidebar');
  if (!items || items.length === 0) {
    aside.innerHTML = '';
    return;
  }
  const links = items.map((item, i) => {
    const isFirst = i === 0;
    const cls = isFirst
      ? 'block pl-4 text-[13px] font-medium text-text-main border-l-2 border-primary -ml-[1px]'
      : 'block pl-4 text-[13px] font-medium text-muted hover:text-text-main transition-colors -ml-[1px]';
    return `<li><a class="${cls}" href="#${item.id}">${escape(item.name)}</a></li>`;
  }).join('');
  aside.innerHTML = `
    <div class="mb-4">
      <h3 class="text-xs font-semibold text-muted uppercase tracking-wider">${escape(title)}</h3>
    </div>
    <ul class="space-y-3 border-l border-border-color">${links}</ul>`;
}

// ─── Views ────────────────────────────────────────────────────────────────────
function renderHome() {
  renderSidebar('', '');
  renderRightSidebar([], '');

  const totalTerms = GLOSSARY.reduce((n, c) => n + c.terms.length, 0);
  const cards = GLOSSARY.map(cat => `
    <a href="#${cat.slug}" class="category-card block border border-border-color rounded-lg p-6 cursor-pointer">
      <div class="flex items-start justify-between mb-3">
        <h2 class="text-text-main font-semibold text-[17px] leading-snug">${escape(cat.category)}</h2>
        <span class="text-muted text-xs border border-border-color rounded px-2 py-0.5 ml-3 shrink-0">${cat.terms.length}</span>
      </div>
      <p class="text-muted text-sm leading-relaxed">${escape(cat.description)}</p>
    </a>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="relative">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[200px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
      <header class="mb-12 relative z-10 max-w-2xl">
        <h1 class="text-5xl font-display font-semibold tracking-tight gradient-text mb-4">LLM Field Notes</h1>
        <p class="text-muted text-lg leading-relaxed">A practical glossary of ${totalTerms} terms for engineers building with AI. No fluff — just what you need to know and why it matters.</p>
      </header>
      <div class="grid grid-cols-1 md:grid-cols-2 gap-3 relative z-10">${cards}</div>
      <div class="mt-12 flex justify-center">
        <a href="${GITHUB_REPO}/issues/new" target="_blank" rel="noopener"
          class="bg-surface hover:bg-surface-hover border border-border-color text-text-main px-4 py-2 rounded-sm text-sm font-medium transition-colors flex items-center gap-2">
          <span class="material-symbols-outlined text-[16px]">add</span>
          Propose a term on GitHub
        </a>
      </div>
    </div>`;
}

function renderCategory(cat) {
  renderSidebar(cat.slug, '');
  renderRightSidebar(cat.terms, 'In this category');

  const rows = cat.terms.map(term => `
    <a class="term-row flex items-center w-full min-h-[80px] py-4 px-4 -mx-4 rounded-sm group" href="#${term.id}">
      <div class="flex flex-col gap-1 w-full">
        <div class="flex items-center justify-between">
          <h2 class="text-[18px] font-mono font-medium text-text-main group-hover:text-primary transition-colors">${escape(term.name)}</h2>
          <span class="material-symbols-outlined text-muted opacity-0 group-hover:opacity-100 transition-opacity">arrow_forward</span>
        </div>
        <p class="text-[15px] text-muted line-clamp-1">${escape(firstSentence(term.body))}</p>
      </div>
    </a>`).join('');

  document.getElementById('main-content').innerHTML = `
    <div class="relative">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[600px] h-[200px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
      <header class="mb-12 relative z-10">
        <div class="flex items-center gap-2 text-muted text-sm mb-4">
          <a class="hover:text-primary transition-colors" href="#">Categories</a>
          <span class="material-symbols-outlined text-[14px]">chevron_right</span>
          <span class="text-text-main">${escape(cat.category)}</span>
        </div>
        <h1 class="text-5xl font-display font-semibold tracking-tight gradient-text mb-4">${escape(cat.category)}</h1>
        <p class="text-muted text-lg leading-relaxed">${escape(cat.description)}</p>
      </header>
      <div class="flex flex-col border-t border-border-color">${rows}</div>
      <div class="mt-12 flex justify-center">
        <a href="${GITHUB_REPO}/issues/new" target="_blank" rel="noopener"
          class="bg-surface hover:bg-surface-hover border border-border-color text-text-main px-4 py-2 rounded-sm text-sm font-medium transition-colors flex items-center gap-2">
          <span class="material-symbols-outlined text-[16px]">add</span>
          Propose a term on GitHub
        </a>
      </div>
    </div>`;
}

function renderTerm(term) {
  const cat = categoryForTerm.get(term.id);
  renderSidebar(cat ? cat.slug : '', term.id);

  // Related items for right sidebar
  const relatedItems = term.related
    .map(name => findTermByName(name))
    .filter(Boolean)
    .map(t => ({ id: t.id, name: t.name }));
  renderRightSidebar(relatedItems, 'Related terms');

  const relatedPills = term.related.map(name => {
    const t = findTermByName(name);
    if (t) {
      return `<a href="#${t.id}" class="inline-flex items-center px-3 py-1 rounded-full border border-border-color text-sm text-muted hover:text-text-main hover:border-primary transition-colors">${escape(name)}</a>`;
    }
    return `<span class="inline-flex items-center px-3 py-1 rounded-full border border-border-color text-sm text-muted">${escape(name)}</span>`;
  }).join('');

  const breadcrumbCat = cat
    ? `<a class="hover:text-primary transition-colors" href="#">Categories</a>
       <span class="material-symbols-outlined text-[14px]">chevron_right</span>
       <a class="hover:text-primary transition-colors" href="#${cat.slug}">${escape(cat.category)}</a>
       <span class="material-symbols-outlined text-[14px]">chevron_right</span>
       <span class="text-text-main">${escape(term.name)}</span>`
    : `<span class="text-text-main">${escape(term.name)}</span>`;

  document.getElementById('main-content').innerHTML = `
    <div class="relative max-w-2xl">
      <div class="absolute top-0 left-1/2 -translate-x-1/2 w-[500px] h-[200px] bg-primary/5 rounded-full blur-[100px] pointer-events-none"></div>
      <header class="mb-10 relative z-10">
        <div class="flex items-center gap-2 text-muted text-sm mb-4 flex-wrap">${breadcrumbCat}</div>
        <h1 class="text-5xl font-display font-semibold tracking-tight gradient-text mb-2">${escape(term.name)}</h1>
        ${term.fullName !== term.name ? `<p class="text-muted text-base">${escape(term.fullName)}</p>` : ''}
      </header>
      <div class="relative z-10">
        <p class="text-text-main text-lg leading-relaxed mb-10">${escape(term.body)}</p>
        ${relatedPills ? `
        <div>
          <h3 class="text-xs font-semibold text-muted uppercase tracking-wider mb-4">Related</h3>
          <div class="flex flex-wrap gap-2">${relatedPills}</div>
        </div>` : ''}
        <div class="mt-12 pt-8 border-t border-border-color flex items-center justify-between">
          ${cat ? `<a href="#${cat.slug}" class="text-sm text-muted hover:text-primary transition-colors flex items-center gap-1"><span class="material-symbols-outlined text-[16px]">arrow_back</span> ${escape(cat.category)}</a>` : '<span></span>'}
          <a href="${GITHUB_REPO}/issues/new" target="_blank" rel="noopener"
            class="bg-surface hover:bg-surface-hover border border-border-color text-text-main px-4 py-2 rounded-sm text-sm font-medium transition-colors flex items-center gap-2">
            <span class="material-symbols-outlined text-[16px]">edit</span>
            Suggest an edit
          </a>
        </div>
      </div>
    </div>`;

  // Scroll active term into view in right sidebar
  setTimeout(() => {
    const active = document.querySelector('#right-sidebar a.text-text-main');
    if (active) active.scrollIntoView({ block: 'nearest' });
  }, 0);
}

// ─── Router ───────────────────────────────────────────────────────────────────
function route() {
  const hash = location.hash.slice(1);
  window.scrollTo(0, 0);

  if (!hash) {
    return renderHome();
  }

  const cat = categoryBySlug.get(hash);
  if (cat) return renderCategory(cat);

  const term = termById.get(hash);
  if (term) return renderTerm(term);

  // Fallback to home
  renderHome();
}

// ─── Search ───────────────────────────────────────────────────────────────────
let searchSelectedIndex = -1;

function setSearchIndex(newIndex) {
  const results = document.querySelectorAll('#search-results .search-result');
  if (results.length === 0) return;
  results.forEach(r => r.classList.remove('search-result-active'));
  searchSelectedIndex = Math.max(0, Math.min(newIndex, results.length - 1));
  results[searchSelectedIndex].classList.add('search-result-active');
  results[searchSelectedIndex].scrollIntoView({ block: 'nearest' });
}

function openSearch() {
  document.getElementById('search-modal').classList.add('open');
  document.getElementById('search-input').value = '';
  document.getElementById('search-results').innerHTML = '';
  searchSelectedIndex = -1;
  document.getElementById('search-input').focus();
  showAllResults('');
}

function closeSearch() {
  document.getElementById('search-modal').classList.remove('open');
}

function showAllResults(q) {
  searchSelectedIndex = -1;
  const container = document.getElementById('search-results');
  const lower = q.toLowerCase();
  const allTerms = [];
  for (const cat of GLOSSARY) {
    for (const term of cat.terms) {
      allTerms.push({ term, cat });
    }
  }

  const filtered = lower
    ? allTerms.filter(({ term }) =>
        term.name.toLowerCase().includes(lower) ||
        term.fullName.toLowerCase().includes(lower))
    : allTerms;

  if (filtered.length === 0) {
    container.innerHTML = `<p class="text-muted text-sm text-center py-6">No results for "${escape(q)}"</p>`;
    return;
  }

  container.innerHTML = filtered.map(({ term, cat }) => `
    <a href="#${term.id}" onclick="closeSearch()"
      class="search-result flex items-center justify-between px-4 py-3 cursor-pointer transition-colors">
      <div>
        <div class="text-text-main text-sm font-medium">${escape(term.name)}</div>
        <div class="text-muted text-xs mt-0.5">${escape(cat.category)}</div>
      </div>
      <span class="material-symbols-outlined text-muted text-[16px]">arrow_forward</span>
    </a>`).join('');
}

// ─── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('hashchange', route);
document.addEventListener('DOMContentLoaded', () => {
  route();

  // Search triggers
  document.getElementById('search-trigger').addEventListener('click', openSearch);
  document.getElementById('search-trigger-mobile').addEventListener('click', openSearch);
  document.getElementById('search-close').addEventListener('click', closeSearch);

  // Close on backdrop click
  document.getElementById('search-modal').addEventListener('click', e => {
    if (e.target === document.getElementById('search-modal')) closeSearch();
  });

  // Search input
  document.getElementById('search-input').addEventListener('input', e => {
    showAllResults(e.target.value);
  });

  document.getElementById('search-input').addEventListener('keydown', e => {
    const results = document.querySelectorAll('#search-results .search-result');
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      setSearchIndex(searchSelectedIndex < 0 ? 0 : searchSelectedIndex + 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (searchSelectedIndex > 0) setSearchIndex(searchSelectedIndex - 1);
    } else if (e.key === 'Enter' && searchSelectedIndex >= 0 && results[searchSelectedIndex]) {
      results[searchSelectedIndex].click();
    }
  });

  // Keyboard shortcuts
  document.addEventListener('keydown', e => {
    if ((e.metaKey || e.ctrlKey) && e.key === 'k') {
      e.preventDefault();
      openSearch();
    }
    if (e.key === 'Escape') closeSearch();
  });
});
</script>
</body>
